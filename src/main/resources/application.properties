# ── Server ──────────────────────────────────────────
server.port=8080

# ── H2 In-Memory Database ───────────────────────────
spring.datasource.url=jdbc:h2:mem:membershipdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ── H2 Browser Console (localhost:8080/h2-console) ──
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── JPA / Hibernate ─────────────────────────────────
# create-drop: creates tables on startup, drops on shutdown
spring.jpa.hibernate.ddl-auto=create-drop
# Run data.sql AFTER Hibernate creates the tables
spring.jpa.defer-datasource-initialization=true
# Show SQL queries in logs (helpful while learning)
spring.jpa.show-sql=true
# Format the SQL for readability
spring.jpa.properties.hibernate.format_sql=true

# ── App name ────────────────────────────────────────
spring.application.name=firstclub-membership

# ── Swagger / OpenAPI ───────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true